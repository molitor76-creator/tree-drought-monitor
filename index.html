<!DOCTYPE html>
<html>

<head>

<title>Tree Drought Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:40px;
}

canvas{
max-width:900px;
margin-bottom:40px;
}

</style>

</head>

<body>

<h1>Tree Drought Monitor</h1>

<h2>Estimated Soil Water Storage</h2>
<canvas id="storageChart"></canvas>

<h2>Drought Stress Level</h2>
<canvas id="stressChart"></canvas>

<script>

async function loadData(){

const response = await fetch("data/history.csv")
const text = await response.text()

const rows = text.trim().split("\n").slice(1)

let dates=[]
let g=[]
let w=[]
let d=[]

let gStress=[]
let wStress=[]
let dStress=[]

const stressMap={
"LOW":0,
"MODERATE":1,
"HIGH":2,
"SEVERE":3
}

rows.forEach(row=>{

const c=row.split(",")

if(c.length<5) return

const date=c[0]
const location=c[1]
const storage=parseFloat(c[2])
const stress=c[4]

if(!dates.includes(date)) dates.push(date)

if(location==="Gauting"){
g.push(storage)
gStress.push(stressMap[stress])
}

if(location==="Waging am See"){
w.push(storage)
wStress.push(stressMap[stress])
}

if(location==="Dettenhausen"){
d.push(storage)
dStress.push(stressMap[stress])
}

})

new Chart(document.getElementById("storageChart"),{

type:"line",

data:{
labels:dates,
datasets:[

{
label:"Gauting",
data:g,
borderColor:"red",
pointRadius:6,
fill:false
},

{
label:"Waging am See",
data:w,
borderColor:"blue",
pointRadius:6,
fill:false
},

{
label:"Dettenhausen",
data:d,
borderColor:"green",
pointRadius:6,
fill:false
}

]
},

options:{responsive:true}

})


new Chart(document.getElementById("stressChart"),{

type:"line",

data:{
labels:dates,
datasets:[

{
label:"Gauting",
data:gStress,
borderColor:"red",
pointRadius:6,
fill:false
},

{
label:"Waging am See",
data:wStress,
borderColor:"blue",
pointRadius:6,
fill:false
},

{
label:"Dettenhausen",
data:dStress,
borderColor:"green",
pointRadius:6,
fill:false
}

]
},

options:{
responsive:true,
scales:{
y:{
ticks:{
callback:function(value){

const map=["LOW","MODERATE","HIGH","SEVERE"]
return map[value]

}
}
}
}
}

})

}

loadData()

</script>

</body>

</html>
