<!DOCTYPE html>
<html>
<head>

<title>Tree Drought Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Tree Drought Monitor</h1>

<canvas id="chart"></canvas>

<script>

async function loadData(){

const response=await fetch("data/history.csv")
const text=await response.text()

const rows=text.split("\n").slice(1)

let dates=[]
let g=[]
let w=[]
let d=[]

rows.forEach(r=>{

const c=r.split(",")

if(c.length>3){

dates.push(c[0])

if(c[1]=="Gauting"){g.push(parseFloat(c[2]))}
if(c[1]=="Waging am See"){w.push(parseFloat(c[2]))}
if(c[1]=="Dettenhausen"){d.push(parseFloat(c[2]))}

}

})

new Chart(document.getElementById("chart"),{

type:"line",

data:{

labels:dates,

datasets:[

{label:"Gauting",data:g},
{label:"Waging am See",data:w},
{label:"Dettenhausen",data:d}

]

}

})

}

loadData()

</script>

</body>
</html>
