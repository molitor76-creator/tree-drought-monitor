<!DOCTYPE html>
<html>
<head>
<title>Tree Drought Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>Tree Drought Monitor</h1>

<canvas id="chart"></canvas>

<script>

async function loadData(){

const response=await fetch("data/history.csv")
const text=await response.text()

const rows=text.split("\n").slice(1)

let labels=[]
let values=[]

rows.forEach(r=>{

const c=r.split(",")

if(c.length>2){

labels.push(c[0])
values.push(parseFloat(c[1]))

}

})

new Chart(document.getElementById("chart"),{

type:"line",

data:{

labels:labels,

datasets:[{

label:"Water Storage",

data:values

}]

}

})

}

loadData()

</script>

</body>
</html>
