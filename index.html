<!DOCTYPE html>
<html>

<head>
<title>Tree Drought Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:40px;
}

canvas{
max-width:900px;
}

</style>

</head>

<body>

<h1>Tree Drought Monitor</h1>

<p>Water storage estimate (mm)</p>

<canvas id="chart"></canvas>

<script>

async function loadData(){

const response = await fetch("data/history.csv");
const text = await response.text();

const rows = text.trim().split("\n").slice(1);

let dates = [];
let gauting = [];
let waging = [];
let dettenhausen = [];

rows.forEach(row => {

const c = row.split(",");

if(c.length < 4) return;

const date = c[0];
const location = c[1];
const storage = parseFloat(c[2]);

if(!dates.includes(date)) dates.push(date);

if(location === "Gauting") gauting.push(storage);
if(location === "Waging am See") waging.push(storage);
if(location === "Dettenhausen") dettenhausen.push(storage);

});

new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:dates,
datasets:[

{
label:"Gauting",
data:gauting,
borderColor:"red",
fill:false
},

{
label:"Waging am See",
data:waging,
borderColor:"blue",
fill:false
},

{
label:"Dettenhausen",
data:dettenhausen,
borderColor:"green",
fill:false
}

]

},

options:{
responsive:true,
scales:{
y:{
title:{
display:true,
text:"Water storage estimate (mm)"
}
}
}

}

});

}

loadData();

</script>

</body>

</html>
