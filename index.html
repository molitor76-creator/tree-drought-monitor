<!DOCTYPE html>
<html>

<head>

<title>Tree Drought Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:40px;
background:#f3f6fb;
}

h1{
margin-bottom:20px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:40px;
}

.card{
flex:1;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h3{
margin-top:0;
}

.status{
font-size:24px;
font-weight:bold;
}

.low{color:green;}
.moderate{color:orange;}
.high{color:red;}
.severe{color:darkred;}

canvas{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:40px;
max-width:900px;
}

</style>

</head>

<body>

<h1>Tree Drought Monitor</h1>

<div class="cards">

<div class="card">
<h3>Gauting</h3>
<div id="gautingStatus" class="status">Loading...</div>
</div>

<div class="card">
<h3>Waging am See</h3>
<div id="wagingStatus" class="status">Loading...</div>
</div>

<div class="card">
<h3>Dettenhausen</h3>
<div id="dettenhausenStatus" class="status">Loading...</div>
</div>

</div>

<h2>Water Storage Trend</h2>
<canvas id="storageChart"></canvas>

<h2>Drought Stress Trend</h2>
<canvas id="stressChart"></canvas>

<script>

async function loadData(){

const response = await fetch("data/history.csv")
const text = await response.text()

const rows = text.trim().split("\n").slice(1)

let dates=[]

let g=[], w=[], d=[]
let gStress=[], wStress=[], dStress=[]

const stressMap={
LOW:0,
MODERATE:1,
HIGH:2,
SEVERE:3
}

const stressLabel=["LOW","MODERATE","HIGH","SEVERE"]

rows.forEach(row=>{

const c=row.split(",")

const date=c[0]
const location=c[1]
const storage=parseFloat(c[2])
const stress=c[4]

if(!dates.includes(date)){

dates.push(date)

g.push(null)
w.push(null)
d.push(null)

gStress.push(null)
wStress.push(null)
dStress.push(null)

}

let i=dates.indexOf(date)

if(location==="Gauting"){
g[i]=storage
gStress[i]=stressMap[stress]
}

if(location==="Waging am See"){
w[i]=storage
wStress[i]=stressMap[stress]
}

if(location==="Dettenhausen"){
d[i]=storage
dStress[i]=stressMap[stress]
}

})

let lastIndex = dates.length - 1

function setStatus(id,value){

let el=document.getElementById(id)

el.innerText=value

el.classList.remove("low","moderate","high","severe")

el.classList.add(value.toLowerCase())

}

setStatus("gautingStatus", stressLabel[gStress[lastIndex]])
setStatus("wagingStatus", stressLabel[wStress[lastIndex]])
setStatus("dettenhausenStatus", stressLabel[dStress[lastIndex]])

new Chart(document.getElementById("storageChart"),{

type:"line",

data:{
labels:dates,
datasets:[
{label:"Gauting",data:g,borderColor:"red",pointRadius:6},
{label:"Waging am See",data:w,borderColor:"blue",pointRadius:6},
{label:"Dettenhausen",data:d,borderColor:"green",pointRadius:6}
]
},

options:{responsive:true}

})


new Chart(document.getElementById("stressChart"),{

type:"line",

data:{
labels:dates,
datasets:[
{label:"Gauting",data:gStress,borderColor:"red",pointRadius:6},
{label:"Waging am See",data:wStress,borderColor:"blue",pointRadius:6},
{label:"Dettenhausen",data:dStress,borderColor:"green",pointRadius:6}
]
},

options:{
responsive:true,
scales:{
y:{
ticks:{
callback:function(v){
return stressLabel[v]
}
}
}
}

}

})

}

loadData()

</script>

</body>
</html>
